# docker-compose.yml — декларативная конфигурация для Qwen Code
# Запускается через bin/qwen-run (тонкая обёртка)

services:
  qwen:
    image: ${QWEN_IMAGE}
    container_name: qwen-${PROJECT_HASH}
    working_dir: /workspace

    # Entryppoint настраивает git и skills перед запуском
    entrypoint: /usr/local/bin/git-entrypoint.sh
    command: ["qwen"]

    environment:
      - QWEN_ALLOW_RUN_IN_HOME=1
      - HOME=/workspace
      - GIT_CONFIG_NAME=${GIT_CONFIG_NAME:-}
      - GIT_CONFIG_EMAIL=${GIT_CONFIG_EMAIL:-}

    volumes:
      # Проект
      - .:/workspace

      # Глобальные конфиги (npm cache, общие конфиги)
      - ${QWEN_CONFIG_DIR}/npm:/root/.npm
      - ${QWEN_CONFIG_DIR}/config:/root/.config

      # Проектный .qwen — только в /root/.qwen
      # /workspace/.qwen остаётся частью mount .:/workspace (не перекрываем)
      - ${QWEN_CONFIG_DIR}/projects/${PROJECT_HASH}/.qwen:/root/.qwen

      # Скиллы (read-only)
      - ${QWEN_CONFIG_DIR}/skills:/root/.qwen/shared-skills:ro

      # AGENTS.md из проекта (read-only)
      - ./AGENTS.md:/root/AGENTS.md:ro

      # Entry-point скрипт (read-only)
      - ./bin/docker-entrypoint.sh:/usr/local/bin/git-entrypoint.sh:ro

    # Временные директории в памяти
    tmpfs:
      - /workspace/.npm:mode=755
      - /workspace/.config:mode=755

    # Порт для встроенного dev-сервера (если используется)
    ports:
      - "${HOST_PORT:-5173}:${CONTAINER_PORT:-5173}"

    security_opt:
      - label=disable
      - no-new-privileges:true

    # Для Docker — запускаем от текущего юзера (чтобы файлы не были root)
    # Для Podman — оставляем пустым (rootless работает корректно)
    user: "${DOCKER_USER:-}"
