name: ShellCheck

on:
  push:
    branches: [master]
    paths:
      - 'bin/**'
  pull_request:
    branches: [master]
    paths:
      - 'bin/**'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: |
          shellcheck --severity=warning bin/qwen-run bin/docker-entrypoint.sh
